name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Go 1.26.0
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"
          check-latest: true

      - name: Resolve docs version
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="$(git describe --tags --abbrev=0 2>/dev/null || true)"
            if [[ -z "${VERSION}" ]]; then
              VERSION="latest"
            fi
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Render docs/index.html from templ
        run: go run ./scripts/render-pages -version "${{ steps.version.outputs.version }}"

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
