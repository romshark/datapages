name: govulncheck
on:
  push:
  pull_request:
  schedule:
    - cron: "22 10 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - path: "."
            name: "root"
          - path: "example/classifieds"
            name: "classifieds"
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"
          check-latest: true
      - name: govulncheck (${{ matrix.project.name }})
        working-directory: ${{ matrix.project.path }}
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
